# Local development infrastructure for LORA API.
# Postgres (with native RLS) + Redis (for BullMQ).
# Start with:  docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: lora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lora
    ports:
      - "5432:5432"
    volumes:
      - lora-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lora"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lora-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - lora-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lora-pgdata:
  lora-redisdata:
